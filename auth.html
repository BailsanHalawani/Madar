<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><link rel="stylesheet" href="style.css"></head>
<body>
    <div style="display:flex; justify-content:center; align-items:center; height:100vh;">
        <form id="authForm" class="card">
            <h2>تسجيل الدخول</h2>
            <input type="email" id="authEmail" placeholder="البريد الإلكتروني" required>
            <input type="password" id="authPassword" placeholder="كلمة المرور" required>
            <button type="submit">دخول</button>
        </form>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="script.js"></script>
</body></html>

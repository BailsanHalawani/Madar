<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مدار - تسجيل الدخول / حساب جديد</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1 id="authTitle">تسجيل الدخول إلى مَدار</h1>
                <p id="authSubtitle">مرحباً بكِ مجدداً! يرجى إدخال بياناتك لمتابعة مهامك.</p>
            </div>

            <form id="authForm">
                <div class="form-group" id="usernameGroup" style="display: none;">
                    <label for="regUsername">اسم المستخدم</label>
                    <input type="text" id="regUsername" placeholder="اكتبي اسمكِ هنا">
                </div>

                <div class="form-group">
                    <label for="authEmail">البريد الإلكتروني</label>
                    <input type="email" id="authEmail" placeholder="example@mail.com" required>
                </div>

                <div class="form-group">
                    <label for="authPassword">كلمة المرور</label>
                    <input type="password" id="authPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit" id="authBtn">دخول</button>
            </form>

            <div class="auth-footer">
                <p id="toggleAuthText">ليس لديكِ حساب؟ <a href="#" id="switchAuthLink">إنشاء حساب جديد</a></p>
            </div>
        </div>
    </div>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script src="script.js"></script>
   
</body>
</html>
